# Render Blueprint — Roots Grocery static site (Vite + React SPA)
# Deploy: push this file to GitHub, then open the Blueprint link in README.

services:
  - type: web
    runtime: static
    name: roots-grocery
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # SPA client-side routing: /, /cart, /product/:id, /checkout, /confirmation
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    previews:
      generation: automatic
